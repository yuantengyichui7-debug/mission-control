<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MISSION CONTROL</title>
  <style>
    /* ここにCSSを全部ぶち込んだぜ */
    body { font-family: sans-serif; background: #111; color: #fff; margin: 0; padding: 20px; }
    .app-container { max-width: 500px; margin: 0 auto; }
    .cycle-card { background: #222; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
    .cycle-day { font-size: 2em; font-weight: bold; }
    .task-card { background: #333; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    input { width: 70%; padding: 10px; background: #444; border: none; color: white; }
    .add-btn { padding: 10px; cursor: pointer; background: #00ff41; border: none; }
  </style>
</head>
<body>

  <div class="app-container">
    <div class="cycle-card">
      <div class="cycle-day">Day 1</div>
    </div>
    <div class="add-task-area">
      <input type="text" id="task-input" placeholder="ミッション...">
      <button onclick="addNewTask()" class="add-btn">＋</button>
    </div>
    <div id="dynamic-mission-list"></div>
  </div>

  <script>
    /* ここにJSを全部ぶち込んだぜ */
    function addNewTask() {
      const input = document.getElementById('task-input');
      const list = document.getElementById('dynamic-mission-list');
      if (input.value.trim() === "") return;
      const newTask = document.createElement('div');
      newTask.className = 'task-card';
      newTask.innerHTML = `<div>${input.value}</div><button>START</button>`;
      list.appendChild(newTask);
      input.value = "";
    }
  </script>
</body>
</html>
